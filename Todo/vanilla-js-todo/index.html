<!DOCTYPE html>
<html lang="ja">

    <head>
        <title>ToDoアプリ</title>
        <meta name="description" content="このアプリはタスクを管理するアプリです。">
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <script src="js/todos.js" defer></script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <header class="site-header">
            <div class="site-header-inner">
                <a class="brand-link" href="./">Todo</a>
                <div id="authSlot" class="auth-slot" aria-label="ログイン状態"></div>
            </div>
        </header>

        <main>
            <p id="appStatus" class="app-status" role="status"></p>

            <div class="composer">
                <textarea id="input" placeholder="タスクを入力" rows="1"></textarea>
                <div class="meta-row" aria-label="日時・時間・場所">
                    <div class="field" data-label="日時">
                        <input id="due" type="date" aria-label="締め切り日">
                    </div>
                    <div class="field field-time" data-label="時間">
                        <input id="endTime" type="time" step="300" aria-label="締め切り時刻">
                    </div>
                    <select id="category" aria-label="科目/タグ">
                        <option value="">種類</option>
                        <option value="授業">授業</option>
                        <option value="研究">研究</option>
                        <option value="バイト">バイト</option>
                        <option value="私用">私用</option>
                    </select>
                    <input id="location" placeholder="場所（例: 図書館 / 3F教室）" aria-label="場所">
                </div>
                <button id="btn">追加</button>
            </div>
            <!--完了数表示-->
            <div class="toolbar">
                <span id="count"></span>
                <button id="clearDoneBtn" type="button">完了したタスクを削除</button>
                <button id="notifyBtn" type="button">通知: OFF</button>
                <button id="recurringBtn" type="button">定期追加</button>
            </div>

            <div class="search-row">
                <input id="searchInput" placeholder="検索（タスク名 / 場所）" aria-label="検索">
            </div>

            <!--フィルター-->
            <div class="filters">
                <button type="button" data-filter="all" aria-pressed="true">全て</button>
                <button type="button" data-filter="active" aria-pressed="false">未完了</button>
                <button type="button" data-filter="done" aria-pressed="false">完了</button>
                <button type="button" data-filter="today" aria-pressed="false">今日</button>
                <button type="button" data-filter="week" aria-pressed="false">今週</button>
            </div>


            <p id="emptyMessage">タスクがありません。追加してみましょう。</p>
            <ul id="list"></ul>

            <h2 class="section-title">期限なし（あとで）</h2>
            <p id="backlogEmpty" class="muted">期限なしタスクはありません。</p>
            <ul id="backlogList"></ul>

            <section class="calendar" aria-label="カレンダー">
                <div class="calendar-header">
                    <div class="calendar-title">
                        <span id="calTitle">カレンダー</span>
                    </div>
                    <div class="calendar-nav">
                        <button id="calPrev" type="button" class="icon-button" aria-label="前の月">
                            <span aria-hidden="true">‹</span>
                        </button>
                        <button id="calNext" type="button" class="icon-button" aria-label="次の月">
                            <span aria-hidden="true">›</span>
                        </button>
                    </div>
                </div>

                <div class="calendar-weekdays" aria-hidden="true">
                    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
                </div>
                <div id="calGrid" class="calendar-grid" role="grid" aria-label="月カレンダー"></div>
                <p id="weatherNote" class="calendar-note"></p>
            </section>
        </main>

        <div id="editOverlay" class="overlay is-hidden" role="dialog" aria-modal="true" aria-labelledby="editTitle">
            <div class="overlay-backdrop" data-close="true"></div>
            <div class="modal-card" role="document">
                <div class="modal-header">
                    <div id="editTitle" class="modal-title">タスク編集</div>
                    <button type="button" class="icon-button" id="editCloseBtn" aria-label="閉じる">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>

                <div class="modal-body">
                    <label class="modal-label" for="editText">タスク名</label>
                    <input id="editText" class="modal-input" type="text">

                    <label class="modal-label" for="editDone">完了</label>
                    <label class="modal-check">
                        <input id="editDone" type="checkbox">
                        <span>完了にする</span>
                    </label>

                    <label class="modal-label">日時</label>
                    <div class="modal-row">
                        <input id="editDue" class="modal-input" type="date" aria-label="締め切り日">
                        <input id="editEndTime" class="modal-input" type="time" step="300" aria-label="締め切り時刻">
                    </div>

                    <label class="modal-label" for="editLocation">場所</label>
                    <input id="editLocation" class="modal-input" type="text" placeholder="場所（空で解除）">

                    <label class="modal-label" for="editCategory">種類</label>
                    <select id="editCategory" class="modal-input" aria-label="種類">
                        <option value="">未設定</option>
                        <option value="授業">授業</option>
                        <option value="研究">研究</option>
                        <option value="バイト">バイト</option>
                        <option value="私用">私用</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button id="editSaveBtn" type="button" class="link-button primary">保存</button>
                    <button id="editCancelBtn" type="button" class="link-button">キャンセル</button>
                </div>
            </div>
        </div>

        <div id="recurringOverlay" class="overlay is-hidden" role="dialog" aria-modal="true" aria-labelledby="recTitle">
            <div class="overlay-backdrop" data-close="true"></div>
            <div class="modal-card" role="document">
                <div class="modal-header">
                    <div id="recTitle" class="modal-title">定期予定の追加（毎週）</div>
                    <button type="button" class="icon-button" id="recCloseBtn" aria-label="閉じる">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>

                <div class="modal-body">
                    <label class="modal-label" for="recText">タスク名</label>
                    <input id="recText" class="modal-input" type="text" placeholder="例: ゼミ">

                    <label class="modal-label" for="recWeekday">曜日</label>
                    <select id="recWeekday" class="modal-input" aria-label="曜日">
                        <option value="1">月</option>
                        <option value="2">火</option>
                        <option value="3">水</option>
                        <option value="4">木</option>
                        <option value="5">金</option>
                        <option value="6">土</option>
                        <option value="0">日</option>
                    </select>

                    <label class="modal-label">時間</label>
                    <div class="modal-row">
                        <input id="recEndTime" class="modal-input" type="time" step="300" aria-label="締め切り時刻">
                        <input id="recLocation" class="modal-input" type="text" placeholder="場所（任意）" aria-label="場所">
                    </div>

                    <div class="app-status" style="min-height: 0;">
                        1年先まで、毎週同じ曜日で自動追加します。
                    </div>
                </div>

                <div class="modal-actions">
                    <button id="recSaveBtn" type="button" class="link-button primary">追加</button>
                    <button id="recCancelBtn" type="button" class="link-button">キャンセル</button>
                </div>
            </div>
        </div>
    </body>
</html>
