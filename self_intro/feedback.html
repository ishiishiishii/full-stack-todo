<!DOCTYPE html>
<html>
    <head>
        <title>フィードバック</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style/style.css">
    </head>

    <body>
        <header>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="pr.html">自己PR</a>
                <a href="research.html">研究</a>
                <a href="feedback.html">フィードバック</a>
            </nav>
        </header>

        <main>
            <h1>フィードバック</h1>
            <form class="feedback-form">
            <p>このWebサイトの評価をお願いします。</p>
                <div class="form-group">
                    <label>評価</label>
                    <label><input type="radio" name="rating">良い</label>
                    <label><input type="radio" name="rating">悪い</label>
                </div>

                <div class="form-group">
                    <label>満足度</label><br>
                    <select>
                        <option>☆☆☆☆☆ (0)</option>
                        <option>★☆☆☆☆ (1)</option>
                        <option>★★☆☆☆ (2)</option>
                        <option>★★★☆☆ (3)</option>
                        <option>★★★★☆ (4)</option>
                        <option>★★★★★ (5)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>年齢</label><br>
                    <select>
                        <option>10代</option>
                        <option>20代</option>
                        <option>30代</option>
                        <option>40代以上</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>性別</label><br>
                    <select>
                        <option>男性</option>
                        <option>女性</option>
                        <option>その他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>良かった点</label><br>
                    <label><input type="checkbox">デザイン</label>
                    <label><input type="checkbox">内容</label>
                    <label><input type="checkbox">見やすさ</label>
                </div>

                <div class="form-group">
                    <label>コメント</label><br>
                    <textarea rows="5" placeholder="自由に書いてください"></textarea>
                </div>

                <button type="submit">送信</button>
            </form>
        </main>
    </body>
</html>
